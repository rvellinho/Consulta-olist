<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CréditoPro · Olist ERP</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f2f7; --s: #fff; --s2: #f7f8fc; --br: #e2e5ef;
      --ac: #1a56db; --acl: #ebf0fd; --g: #0e9f6e; --gl: #def7ec;
      --am: #c27803; --aml: #fdf6b2; --red: #e02424; --redl: #fde8e8;
      --mt: #6b7280; --tx: #111827; --tx2: #374151;
      --r: 12px; --sh: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }
    body { background: var(--bg); color: var(--tx); font-family: 'Epilogue', sans-serif; min-height: 100vh; }
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a2e5a, #1a56db); padding: 20px; }
    .login-card { background: #fff; border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .brand-icon { font-size: 28px; color: var(--ac); }
    .brand-name { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--tx); }
    .brand-name em { color: var(--ac); font-style: normal; }
    .login-sub { font-size: 13px; color: var(--mt); margin-bottom: 28px; }
    .fg { margin-bottom: 16px; }
    .fg label { display: block; font-size: 11px; font-weight: 700; color: var(--tx2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
    .fg input, .fg textarea { width: 100%; border: 1.5px solid var(--br); border-radius: 8px; padding: 10px 14px; font-size: 14px; font-family: 'Epilogue', sans-serif; color: var(--tx); background: var(--s2); outline: none; transition: border .2s; }
    .fg input:focus, .fg textarea:focus { border-color: var(--ac); background: #fff; }
    .fg textarea { resize: vertical; min-height: 110px; }
    .btn-primary { background: var(--ac); color: #fff; border: none; border-radius: 8px; padding: 10px 22px; font-size: 14px; font-weight: 700; font-family: 'Syne', sans-serif; cursor: pointer; transition: opacity .2s; white-space: nowrap; }
    .btn-primary:hover:not(:disabled) { opacity: .88; }
    .btn-primary:disabled { opacity: .5; cursor: default; }
    .w100 { width: 100%; margin-bottom: 14px; }
    .btn-sec { background: var(--s2); border: 1.5px solid var(--br); border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--tx2); transition: all .15s; font-family: 'Epilogue', sans-serif; }
    .btn-sec:hover:not(:disabled) { border-color: var(--ac); color: var(--ac); }
    .btn-sec:disabled { opacity: .35; cursor: default; }
    .msg-erro-box { background: var(--redl); color: var(--red); border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; }
    .login-hint { font-size: 11px; color: var(--mt); text-align: center; background: var(--s2); border-radius: 6px; padding: 8px 12px; }
    .hidden { display: none !important; }
    .app { max-width: 1200px; margin: 0 auto; padding: 0 16px 40px; }
    .hdr { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; margin-bottom: 20px; border-bottom: 1px solid var(--br); }
    .hdr .brand-icon { font-size: 20px; } .hdr .brand-name { font-size: 17px; }
    .badge-demo { background: var(--aml); color: var(--am); border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 700; margin-left: 8px; }
    .hdr-user { display: flex; align-items: center; gap: 12px; }
    .u-info { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
    .u-nome { font-size: 13px; font-weight: 600; color: var(--tx2); }
    .bp { font-size: 10px; font-weight: 700; border-radius: 20px; padding: 2px 8px; text-transform: uppercase; letter-spacing: .5px; }
    .bp-admin { background: #e8f0fe; color: var(--ac); }
    .bp-analista { background: var(--gl); color: var(--g); }
    .bp-viz { background: var(--s2); color: var(--mt); border: 1px solid var(--br); }
    .btn-logout { background: var(--s2); border: 1px solid var(--br); border-radius: 8px; padding: 7px 14px; font-size: 12px; color: var(--mt); cursor: pointer; transition: all .15s; }
    .btn-logout:hover { border-color: var(--red); color: var(--red); background: var(--redl); }
    .search-bar { display: flex; gap: 10px; margin-bottom: 14px; }
    .search-wrap { flex: 1; position: relative; }
    .si { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--mt); }
    .search-wrap input { width: 100%; border: 1.5px solid var(--br); border-radius: 8px; padding: 10px 14px 10px 38px; font-size: 14px; font-family: 'Epilogue', sans-serif; color: var(--tx); background: #fff; outline: none; transition: border .2s; }
    .search-wrap input:focus { border-color: var(--ac); }
    .aviso { background: var(--aml); color: var(--am); border-radius: 8px; padding: 10px 14px; font-size: 12px; margin-bottom: 12px; border: 1px solid #fcd34d; line-height: 1.5; }
    .table-wrap { background: #fff; border-radius: var(--r); border: 1px solid var(--br); overflow: hidden; box-shadow: var(--sh); }
    table { width: 100%; border-collapse: collapse; }
    thead th { background: var(--s2); padding: 11px 15px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--mt); text-align: left; border-bottom: 1px solid var(--br); }
    tbody tr { border-bottom: 1px solid var(--br); cursor: pointer; transition: background .12s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--acl); }
    tbody td { padding: 12px 15px; font-size: 14px; vertical-align: middle; }
    .td-cod { font-size: 12px; color: var(--mt); font-family: 'Syne', sans-serif; }
    .td-cli { display: flex; align-items: center; gap: 10px; }
    .av { width: 34px; height: 34px; border-radius: 8px; background: linear-gradient(135deg, #1a56db, #6366f1); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; font-family: 'Syne', sans-serif; flex-shrink: 0; }
    .td-rz { color: var(--mt); font-size: 13px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .td-lim { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--ac); }
    .ba { background: var(--gl); color: var(--g); border-radius: 6px; padding: 3px 9px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .bp2 { background: var(--aml); color: var(--am); border-radius: 6px; padding: 3px 9px; font-size: 11px; font-weight: 600; }
    .arr { color: var(--ac); font-size: 15px; }
    .state-center { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 60px 20px; color: var(--mt); }
    .spinner { width: 30px; height: 30px; border: 3px solid var(--br); border-top-color: var(--ac); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .pag { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; gap: 10px; flex-wrap: wrap; }
    .pag-inf { font-size: 13px; color: var(--mt); }
    .overlay { position: fixed; inset: 0; background: rgba(17,24,39,.5); backdrop-filter: blur(3px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fi .15s; }
    @keyframes fi { from { opacity: 0; } to { opacity: 1; } }
    .modal { background: #fff; border-radius: 16px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; box-shadow: 0 25px 60px rgba(0,0,0,.25); animation: su .2s; }
    @keyframes su { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-hdr { display: flex; align-items: flex-start; gap: 14px; padding: 22px 22px 16px; border-bottom: 1px solid var(--br); position: sticky; top: 0; background: #fff; z-index: 1; }
    .modal-av { width: 46px; height: 46px; border-radius: 12px; background: linear-gradient(135deg, #1a56db, #6366f1); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 800; font-family: 'Syne', sans-serif; flex-shrink: 0; }
    .modal-hdr-info { flex: 1; min-width: 0; }
    .modal-hdr h2 { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .c-razao { font-size: 12px; color: var(--mt); margin-bottom: 4px; }
    .c-cod { font-size: 11px; font-weight: 600; color: var(--ac); background: var(--acl); border-radius: 4px; padding: 2px 6px; }
    .close-btn { background: var(--s2); border: 1px solid var(--br); border-radius: 8px; width: 32px; height: 32px; cursor: pointer; font-size: 13px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .15s; }
    .close-btn:hover { background: var(--redl); color: var(--red); border-color: var(--red); }
    .modal-body { padding: 18px 22px; display: flex; flex-direction: column; gap: 18px; }
    .sec-title { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: var(--tx2); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .5px; }
    .input-limite { font-size: 20px; font-family: 'Syne', sans-serif; font-weight: 700; color: var(--ac); }
    .field-ro { font-size: 20px; font-family: 'Syne', sans-serif; font-weight: 700; padding: 10px 14px; background: var(--s2); border-radius: 8px; color: var(--ac); }
    .modal-loading { display: flex; align-items: center; gap: 10px; padding: 20px 0; color: var(--mt); font-size: 14px; }
    .spinner-sm { width: 18px; height: 18px; border: 2px solid var(--br); border-top-color: var(--ac); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
    .ro-block { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
    .ro-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--mt); }
    .anot-txt { font-size: 14px; color: var(--tx2); line-height: 1.6; white-space: pre-wrap; background: var(--s2); border-radius: 8px; padding: 10px 14px; }
    .sem-analise { font-size: 13px; color: var(--mt); background: var(--s2); border-radius: 8px; padding: 12px 14px; }
    .audit-row { display: flex; justify-content: space-between; align-items: center; margin: 0 22px; padding: 9px 13px; background: var(--s2); border-radius: 8px; font-size: 12px; color: var(--mt); flex-wrap: wrap; gap: 6px; }
    .modal-msg { margin: 10px 22px 0; border-radius: 8px; padding: 10px 14px; font-size: 13px; font-weight: 500; }
    .msg-ok { background: var(--gl); color: var(--g); }
    .msg-err { background: var(--redl); color: var(--red); }
    .modal-ftr { display: flex; gap: 10px; justify-content: flex-end; padding: 14px 22px; border-top: 1px solid var(--br); margin-top: 14px; }
    @media (max-width: 640px) { .td-rz, thead th:nth-child(3), tbody td:nth-child(3) { display: none; } }
  </style>
</head>
<body>

<div id="tela-login" class="login-wrap">
  <div class="login-card">
    <div class="brand"><span class="brand-icon">◈</span><span class="brand-name">Crédito<em>Pro</em></span></div>
    <p class="login-sub">Gestão de Crédito · Integração Olist ERP</p>
    <div class="fg"><label>Usuário</label><input id="inp-login" placeholder="seu.login" /></div>
    <div class="fg"><label>Senha</label><input id="inp-senha" type="password" placeholder="••••••••" /></div>
    <div id="login-erro" class="msg-erro-box hidden"></div>
    <button class="btn-primary w100" onclick="fazerLogin()">Entrar</button>
    <div class="login-hint"><strong>Usuários:</strong> admin / ana / carlos &nbsp;·&nbsp; Senha: login + 123</div>
  </div>
</div>

<div id="tela-app" class="app hidden">
  <header class="hdr">
    <div class="brand">
      <span class="brand-icon">◈</span>
      <span class="brand-name">Crédito<em>Pro</em></span>
      <span id="badge-demo" class="badge-demo hidden">DEMO</span>
    </div>
    <div class="hdr-user">
      <div class="u-info">
        <span id="usr-nome" class="u-nome"></span>
        <span id="usr-perfil" class="bp"></span>
      </div>
      <button class="btn-logout" onclick="fazerLogout()">⎋ Sair</button>
    </div>
  </header>
  <div class="search-bar">
    <div class="search-wrap">
      <span class="si">🔍</span>
      <input id="inp-busca" placeholder="Buscar por nome, fantasia ou código..." onkeydown="if(event.key==='Enter') buscar()" />
    </div>
    <button class="btn-primary" onclick="buscar()">Buscar</button>
  </div>
  <div id="aviso" class="aviso hidden"></div>
  <div class="table-wrap">
    <div id="estado" class="state-center"><div class="spinner"></div><p>Carregando...</p></div>
    <table id="tabela" class="hidden">
      <thead><tr>
        <th>Código</th><th>Fantasia</th><th>Razão Social</th>
	<th id="th-analise">Análise</th><th></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="pag">
    <button class="btn-sec" id="btn-ant" onclick="mudarPagina(-1)" disabled>← Anterior</button>
    <span class="pag-inf" id="pag-inf">Página 1 · 100 por página</span>
    <button class="btn-sec" id="btn-prox" onclick="mudarPagina(1)">Próxima →</button>
  </div>
</div>

<div id="modal-overlay" class="overlay hidden" onclick="fecharModal(event)">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-av" id="m-av"></div>
      <div class="modal-hdr-info">
        <h2 id="m-titulo"></h2>
        <p class="c-razao" id="m-razao"></p>
        <span class="c-cod" id="m-cod"></span>
      </div>
      <button class="close-btn" onclick="document.getElementById('modal-overlay').classList.add('hidden')">✕</button>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="modal-loading"><div class="spinner-sm"></div> Carregando dados do cliente...</div>
    </div>
    <div id="m-audit" class="audit-row hidden"></div>
    <div id="m-msg" class="modal-msg hidden"></div>
    <div class="modal-ftr">
      <button class="btn-sec" onclick="document.getElementById('modal-overlay').classList.add('hidden')">Fechar</button>
      <button id="btn-salvar" class="btn-primary hidden" onclick="salvarCliente()">Salvar Alterações</button>
    </div>
  </div>
</div>

<script>
const USUARIOS = [
  { id:1, nome:"Administrador", login:"admin",  senha:"admin123",  perfil:"admin" },
  { id:2, nome:"Ana Paula",     login:"ana",    senha:"ana123",    perfil:"analista" },
  { id:3, nome:"Carlos Souza",  login:"carlos", senha:"carlos123", perfil:"visualizador" },
];

let usuarioAtual=null, paginaAtual=1, buscaAtual="", temProxima=false, clienteSel=null, modoDemo=false;
let analisesBD={};

const fmtBRL=v=>new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL",maximumFractionDigits:0}).format(v||0);
const fmtData=iso=>{if(!iso)return"—";const[y,m,d]=iso.split("-");return`${d}/${m}/${y}`};
const ini=n=>{if(!n)return"?";const p=n.trim().split(" ").filter(Boolean);return((p[0]?.[0]||"")+(p[1]?.[0]||"")).toUpperCase()};
const el=id=>document.getElementById(id);

const DEMO=Array.from({length:20},(_,i)=>({id:1000+i,codigo:`C${String(1000+i).padStart(4,"0")}`,nome:["Metalúrgica Souza Ltda","Distribuidora Norte S.A.","Papelaria Central Eireli","Tech Solutions Ltda","Supermercado Família Eireli","Construtora Horizonte S.A.","Farmácia Popular Ltda","Agropecuária Vale Verde","Academia Corpo em Forma","Transportadora Rápida S.A.","Clínica Médica Total Ltda","Escola Dom Pedro II","Indústria Plástica Ltda","Atacadão Ferragens","Gráfica Central","Posto BH","Floricultura Rosas","Auto Peças Sul","Gelato Fino Ltda","Madeireira São José"][i],fantasia:["MetalSouza","DistriNorte","PapelCentral","TechSol","Fam.Oliveira","Horizonte","FarmaPopular","ValeVerde","CorpoForma","TranspRápida","SaúdeTotal","DomPedroII","PlásticaBV","AtacadãoF","GráficaC","PosoBH","Floricultura","AutoPeças","GelatoFino","MadeireiraSJ"][i],limiteCredito:[85000,120000,15000,200000,45000,350000,30000,95000,12000,180000,60000,25000,75000,130000,42000,90000,8000,55000,18000,110000][i]}));

function fazerLogin(){
  const login=el("inp-login").value.trim(),senha=el("inp-senha").value;
  const u=USUARIOS.find(x=>x.login===login&&x.senha===senha);
  if(!u){el("login-erro").textContent="Usuário ou senha incorretos.";el("login-erro").classList.remove("hidden");return;}
  usuarioAtual=u;sessionStorage.setItem("sessao",JSON.stringify(u));
  el("tela-login").classList.add("hidden");el("tela-app").classList.remove("hidden");
  el("usr-nome").textContent=u.nome;
  const bp={admin:["Admin","bp-admin"],analista:["Analista","bp-analista"],visualizador:["Visualizador","bp-viz"]}[u.perfil];
  el("usr-perfil").textContent=bp[0];el("usr-perfil").className=`bp ${bp[1]}`;
  if(u.perfil==="visualizador")el("th-analise").style.display="none";
  carregarClientes(1,"");
}
function fazerLogout(){sessionStorage.removeItem("sessao");usuarioAtual=null;el("tela-app").classList.add("hidden");el("tela-login").classList.remove("hidden");el("inp-login").value="";el("inp-senha").value="";}
el("inp-senha").addEventListener("keydown",e=>{if(e.key==="Enter")fazerLogin()});

async function carregarClientes(pagina,pesquisa){
  paginaAtual=pagina;buscaAtual=pesquisa;
  el("estado").innerHTML='<div class="spinner"></div><p>Consultando Olist ERP...</p>';
  el("estado").classList.remove("hidden");el("tabela").classList.add("hidden");el("aviso").classList.add("hidden");
  try{
    const res=await fetch(`/api/contatos?pagina=${pagina}&pesquisa=${encodeURIComponent(pesquisa||" ")}`);
    if(!res.ok)throw new Error(`Erro ${res.status}`);
    const data=await res.json();
    const lista=data.itens||[];
    analisesBD=data.analises||{};
    modoDemo=false;
    renderTabela(lista);
    temProxima=lista.length===100;
  }catch(e){
    modoDemo=true;el("badge-demo").classList.remove("hidden");
    el("aviso").textContent=`⚠️ Não foi possível conectar à API Olist. Exibindo dados demonstrativos. Erro: ${e.message}`;
    el("aviso").classList.remove("hidden");
    renderTabela(DEMO);temProxima=false;
  }
  el("btn-ant").disabled=paginaAtual<=1;el("btn-prox").disabled=!temProxima;
  el("pag-inf").textContent=`Página ${paginaAtual} · 100 registros por página`;
}

function renderTabela(lista){
  el("estado").classList.add("hidden");el("tabela").classList.remove("hidden");
  const podeVer=usuarioAtual.perfil!=="visualizador",tbody=el("tbody");
  tbody.innerHTML="";
  if(!lista.length){el("tabela").classList.add("hidden");el("estado").innerHTML="<p>🔎 Nenhum cliente encontrado.</p>";el("estado").classList.remove("hidden");return;}
  lista.forEach(c=>{
    const id=c.id,nome=c.nome||c.razaoSocial||"",fantasia=c.fantasia||c.nomeFantasia||"";
    const an=analisesBD[String(id)];
    const tr=document.createElement("tr");
    tr.innerHTML=`<td class="td-cod">${c.codigo||id}</td><td><div class="td-cli"><span class="av">${ini(fantasia||nome)}</span><span>${fantasia||"—"}</span></div></td><td class="td-rz">${nome}</td><td class="td-lim" id="lim-${id}">—</td>${podeVer?`<td>${an?`<span class="ba">✓ ${fmtData(an.data_analise)}</span>`:`<span class="bp2">Pendente</span>`}</td>`:""}<td><span class="arr">→</span></td>`;
    tr.onclick=()=>abrirModal(c);tbody.appendChild(tr);
  });
}

function buscar(){carregarClientes(1,el("inp-busca").value.trim());}
function mudarPagina(d){carregarClientes(paginaAtual+d,buscaAtual);}

async function abrirModal(c){
  clienteSel=c;
  const id=c.id,nome=c.nome||c.razaoSocial||"",fantasia=c.fantasia||c.nomeFantasia||"";
  const an=analisesBD[String(id)];
  const podeEditar=usuarioAtual.perfil!=="visualizador";

  // Mostra modal com loading
  el("m-av").textContent=ini(fantasia||nome);
  el("m-titulo").textContent=fantasia||nome;
  el("m-razao").textContent=nome;
  el("m-cod").textContent=`#${c.codigo||id}`;
  el("m-audit").classList.add("hidden");
  el("m-msg").classList.add("hidden");
  el("btn-salvar").classList.add("hidden");
  el("modal-body").innerHTML='<div class="modal-loading"><div class="spinner-sm"></div> Carregando dados do cliente...</div>';
  el("modal-overlay").classList.remove("hidden");

  // Busca dados completos do cliente (com limite_credito)
  let limite = 0;
  if(!modoDemo){
    try{
      const res=await fetch(`/api/contatos?id=${id}`);
      if(res.ok){
        const data=await res.json();
        const ct=data.contato||{};
        limite=parseFloat(ct.limite_credito)||0;
        // Atualiza o limite na tabela também
        const tdLim=document.getElementById(`lim-${id}`);
        if(tdLim) tdLim.textContent=fmtBRL(limite);
      }
    }catch{}
  } else {
    limite=c.limiteCredito||0;
  }

  // Monta conteúdo do modal
  let html=`
    <div>
      <div class="sec-title">💳 Limite de Crédito</div>
      <div class="fg">
        <label>Valor (R$)</label>
        ${podeEditar
          ? `<input id="m-limite" class="input-limite fg input" value="${String(limite).replace('.',',')}" placeholder="0,00" />`
          : `<div class="field-ro">${fmtBRL(limite)}</div>`}
      </div>
    </div>`;

  if(podeEditar){
    html+=`
    <div>
      <div class="sec-title">📋 Análise de Crédito</div>
      <div class="fg"><label>Data da Última Análise</label><input type="date" id="m-data" value="${an?.data_analise||''}" /></div>
      <div class="fg"><label>Anotações da Análise</label><textarea id="m-anotacoes" rows="5" placeholder="Descreva a análise realizada, documentos consultados, score, observações...">${an?.anotacoes||''}</textarea></div>
    </div>`;
  } else if(an){
    html+=`
    <div>
      <div class="sec-title">📋 Análise de Crédito</div>
      <div class="ro-block"><span class="ro-label">Data da análise</span><span>${fmtData(an.data_analise)}</span></div>
      <div class="ro-block"><span class="ro-label">Anotações</span><p class="anot-txt">${an.anotacoes||'—'}</p></div>
    </div>`;
  } else {
    html+=`
    <div>
      <div class="sec-title">📋 Análise de Crédito</div>
      <p class="sem-analise">Nenhuma análise registrada para este cliente.</p>
    </div>`;
  }

  el("modal-body").innerHTML=html;

  if(an?.ultimo_usuario){
    el("m-audit").innerHTML=`<span>👤 Última alteração por <strong>${an.ultimo_usuario}</strong></span><span>${new Date(an.ultima_alteracao).toLocaleString("pt-BR")}</span>`;
    el("m-audit").classList.remove("hidden");
  }

  if(podeEditar) el("btn-salvar").classList.remove("hidden");
}

function fecharModal(e){if(e.target===el("modal-overlay"))el("modal-overlay").classList.add("hidden");}

async function salvarCliente(){
  const btn=el("btn-salvar");btn.disabled=true;btn.textContent="Salvando...";el("m-msg").classList.add("hidden");
  try{
    const limiteInput=el("m-limite");
    if(!limiteInput)throw new Error("Campo de limite não encontrado.");
    const limiteNum=parseFloat(limiteInput.value.replace(/\./g,"").replace(",","."));
    if(isNaN(limiteNum))throw new Error("Valor de limite inválido.");
    const dataAnalise=el("m-data")?.value||"";
    const anotacoes=el("m-anotacoes")?.value||"";

    if(!modoDemo){
      const res=await fetch("/api/salvar",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          id:clienteSel.id,
          nome:clienteSel.nome||clienteSel.razaoSocial,
          limiteCredito:limiteNum,
          dataAnalise,
          anotacoes,
          ultimoUsuario:usuarioAtual.nome
        })
      });
      if(!res.ok){const err=await res.json();throw new Error(err.erro||`Erro ${res.status}`);}
    }

    // Atualiza cache local
    analisesBD[String(clienteSel.id)]={
      data_analise:dataAnalise,
      anotacoes,
      ultimo_usuario:usuarioAtual.nome,
      ultima_alteracao:new Date().toISOString()
    };

    // Atualiza limite na tabela
    const tdLim=document.getElementById(`lim-${clienteSel.id}`);
    if(tdLim) tdLim.textContent=fmtBRL(limiteNum);

    const d=el("m-msg");
    d.textContent=modoDemo?"✓ Análise salva (modo demo).":"✓ Salvo com sucesso no Olist ERP e banco de dados!";
    d.className="modal-msg msg-ok";d.classList.remove("hidden");
    setTimeout(()=>{el("modal-overlay").classList.add("hidden");carregarClientes(paginaAtual,buscaAtual);},1800);
  }catch(e){
    const d=el("m-msg");d.textContent=`Erro: ${e.message}`;d.className="modal-msg msg-err";d.classList.remove("hidden");
  }finally{btn.disabled=false;btn.textContent="Salvar Alterações";}
}

(function(){try{const s=JSON.parse(sessionStorage.getItem("sessao"));if(s){el("inp-login").value=s.login;el("inp-senha").value=s.senha;fazerLogin();}}catch{}})();
</script>
